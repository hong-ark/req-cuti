<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Konfigurasi Jadwal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4" style="max-width:650px;">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">
                ⚙️ Konfigurasi Jadwal
            </h4>

            <button
                class="btn btn-light btn-sm"
                onclick="loadConfig()">

                Reload

            </button>

        </div>

        <div class="card-body">

            <form id="configForm">

                <div class="mb-3">

                    <label class="form-label">Tahun</label>

                    <select
    class="form-select"
    id="YEAR">
</select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Bulan</label>

                    <select
                        class="form-select"
                        id="MONTH">

                        <option value="1">Januari</option>
                        <option value="2">Februari</option>
                        <option value="3">Maret</option>
                        <option value="4">April</option>
                        <option value="5">Mei</option>
                        <option value="6">Juni</option>
                        <option value="7">Juli</option>
                        <option value="8">Agustus</option>
                        <option value="9">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Mulai Request</label>

                    <input
    type="date"
    class="form-control"
    id="REQUEST_START">

                </div>

                <div class="mb-3">

                    <label class="form-label">Tutup Request</label>

                    <input
    type="date"
    class="form-control"
    id="REQUEST_END">

                </div>

                <div class="mb-3">

                    <label class="form-label">Total OFF+C</label>

                    <input
                        type="number"
                        class="form-control"
                        id="LIMIT_OFF_C">

                </div>

                <div class="mb-3">

                    <label class="form-label">Officer OFF+C</label>

                    <input
                        type="number"
                        class="form-control"
                        id="LIMIT_OFFICER_OFF_C">

                </div>

                <div class="mb-3">

                    <label class="form-label">Total M</label>

                    <input
                        type="number"
                        class="form-control"
                        id="LIMIT_M">

                </div>

                <div class="mb-3">

                    <label class="form-label">Officer M</label>

                    <input
                        type="number"
                        class="form-control"
                        id="LIMIT_OFFICER_M">

                </div>

                <div class="mb-3">

                    <label class="form-label">M Hari Terakhir</label>

                    <input
                        type="number"
                        class="form-control"
                        id="LIMIT_LASTDAY_M">

                </div>

                <div class="form-check form-switch mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="ANTI_PASTE">

                    <label class="form-check-label">

                        Anti Paste

                    </label>

                </div>

                <button
                    class="btn btn-primary"
                    type="submit">

                    💾 Simpan

                </button>

            </form>

        </div>

    </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwXX-KPR0qCmrCH4qy6_59gwsHtTSetjwfsWoj5Y9CqjFIE5K5elp09vw5_afv1s3Eg/exec";
const currentYear = new Date().getFullYear();

for(let y=2022;y<=currentYear+20;y++){

    YEAR.innerHTML += `
        <option value="${y}">
            ${y}
        </option>
    `;

}

loadConfig();

YEAR.addEventListener("change", updateDate);

MONTH.addEventListener("change", updateDate);
function setRequestDate(cfg){

    const year = cfg.YEAR;

    const month = String(cfg.MONTH).padStart(2,"0");

    REQUEST_START.value =
        `${year}-${month}-${String(cfg.REQUEST_START).padStart(2,"0")}`;

    REQUEST_END.value =
        `${year}-${month}-${String(cfg.REQUEST_END).padStart(2,"0")}`;

}
function updateDate(){

    const year = YEAR.value;

    const month = String(MONTH.value).padStart(2,"0");

    const startDay =
        REQUEST_START.value
        ? REQUEST_START.value.split("-")[2]
        : "01";

    const endDay =
        REQUEST_END.value
        ? REQUEST_END.value.split("-")[2]
        : "01";

    REQUEST_START.value =
        `${year}-${month}-${startDay}`;

    REQUEST_END.value =
        `${year}-${month}-${endDay}`;

}
function loadConfig(){

fetch(API+"?action=getconfig")

.then(r=>r.json())

.then(cfg=>{

YEAR.value=cfg.YEAR;
MONTH.value=cfg.MONTH;

setRequestDate(cfg);

LIMIT_OFF_C.value=cfg.LIMIT_OFF_C;
LIMIT_OFFICER_OFF_C.value=cfg.LIMIT_OFFICER_OFF_C;

LIMIT_M.value=cfg.LIMIT_M;
LIMIT_OFFICER_M.value=cfg.LIMIT_OFFICER_M;

LIMIT_LASTDAY_M.value=cfg.LIMIT_LASTDAY_M;

ANTI_PASTE.checked=cfg.ANTI_PASTE;

});

}

document.getElementById("configForm").addEventListener("submit",function(e){

e.preventDefault();

const data={

YEAR:YEAR.value,
MONTH:MONTH.value,

REQUEST_START:
REQUEST_START.value.split("-")[2],

REQUEST_END:
REQUEST_END.value.split("-")[2],

LIMIT_OFF_C:LIMIT_OFF_C.value,
LIMIT_OFFICER_OFF_C:LIMIT_OFFICER_OFF_C.value,

LIMIT_M:LIMIT_M.value,
LIMIT_OFFICER_M:LIMIT_OFFICER_M.value,

LIMIT_LASTDAY_M:LIMIT_LASTDAY_M.value,

ANTI_PASTE:ANTI_PASTE.checked

};

fetch(API+"?action=saveconfig",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

.then(r=>r.json())

.then(res=>{

alert(res.message);

});

});

</script>

</body>
</html>
